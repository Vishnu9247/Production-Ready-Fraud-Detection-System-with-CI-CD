name: Train Build Push Deploy to Azure

on:
  push:
    branches:
      - main
    paths:
      - "Data Files/Raw Files/**"

jobs:
  train-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run preprocessing
        run: |
          python Python_Scripts/preprocess.py

      - name: Run training
        run: |
          python Python_Scripts/train.py

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name machinelearningmodels

      - name: Build Docker image
        run: |
          docker build -t machinelearningmodels.azurecr.io/ml/creditcard_fraud_mlmodel:v${{ github.run_number }} ./App
          docker tag machinelearningmodels.azurecr.io/ml/creditcard_fraud_mlmodel:v${{ github.run_number }} machinelearningmodels.azurecr.io/ml/creditcard_fraud_mlmodel:latest

      - name: Push Docker image to ACR
        run: |
          docker push machinelearningmodels.azurecr.io/ml/creditcard_fraud_mlmodel:v${{ github.run_number }}
          docker push machinelearningmodels.azurecr.io/ml/creditcard_fraud_mlmodel:latest

      - name: Update Azure Container App
        run: |
          az containerapp update \
            --name credit-card-fraud \
            --resource-group Machine_Learning_Deployment \
            --image machinelearningmodels.azurecr.io/ml/creditcard_fraud_mlmodel:v${{ github.run_number }}